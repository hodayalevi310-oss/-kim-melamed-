<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM MELAMED - הלחמת ריסים ואיפור קבוע</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #d4a5b2;
            --soft-white: #f8f8f8;
            --dark-card: rgba(255, 255, 255, 0.08);
            
            /* --- החליפי את הקישור הזה בקישור לתמונה שלך --- */
            --bg-image: url('https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=1000&q=80');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: var(--soft-white);
            scroll-behavior: smooth;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-image);
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* עיצוב משופר לשם עם האמוג'י */
        .name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px; /* מרווח קטן בין השם לנשיקה */
            color: var(--primary-pink);
            font-size: 2.2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .lip-emoji { font-size: 1.6rem; vertical-align: middle; } /* הקטנת האמוג'י */

        .hero h2 { font-size: 1.2rem; font-weight: 300; margin: 15px 0 5px; }
        .hero p { font-size: 0.9rem; margin: 0 0 30px; opacity: 0.8; max-width: 300px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { padding: 18px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-fill { background: var(--primary-pink); color: #4a1a2c; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.5); color: var(--soft-white); }

        /* כפתורים צפים */
        .floating-icons { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 1000; pointer-events: none; }
        .icon-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: auto; }
        .wa-color { background: #25d366; }
        .ig-color { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
    </style>
</head>
<body>

    <section class="hero">
        <div class="name-wrapper">
            KIM MELAMED
            <span class="lip-emoji">👄</span>
        </div>
        <h2>המבט שלך, המומחיות שלנו</h2>
        <p>متמחה במראה טבעי שחוסך לך זמן בבוקר ☕️</p>
        
        <div class="btn-group">
            <a href="https://wa.me/972558854215" class="btn btn-fill" target="_blank">קבעו תור</a>
            <a href="#" class="btn btn-outline">הכירו את השירותים</a>
        </div>
    </section>

    <div class="floating-icons">
        <a href="https://wa.me/972558854215" class="icon-btn wa-color" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="https://www.instagram.com/kim.beauty.1?igsh=MWU1c2J5Zmdka242aA==" class="icon-btn ig-color" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>
    </div>

</body>
</html>
