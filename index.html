<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM MELAMED | קים מלמד - הלחמת ריסים</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #d4a5b2;
            --dark-bg: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            scroll-behavior: smooth;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 2.5rem; letter-spacing: 3px; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        .btn-main {
            background: var(--primary-pink);
            color: #4a1a2c;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* שירותים */
        .section { padding: 60px 20px; text-align: center; }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* גלריה */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }
        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
        }

        /* טופס */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.9);
        }

        /* כפתורים צפים למטה */
        .floating-buttons {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .float-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .wa-btn { background-color: #25d366; }
        .ig-btn { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }

    </style>
</head>
<body>

    <section class="hero">
        <h1>KIM MELAMED</h1>
        <p>המבט שלך, המומחיות שלנו</p>
        <a href="#booking" class="btn-main">קבעו תור</a>
    </section>

    <section class="section">
        <h2>השירותים שלנו</h2>
        <div class="card">
            <i class="fa-regular fa-eye" style="font-size: 30px; color: var(--primary-pink);"></i>
            <h3>הלחמת ריסים</h3>
            <p>קלאסי, ווליום, מגה ווליום - התאמה מדויקת למבנה העין שלך.</p>
        </div>
        <div class="card">
            <i class="fa-solid fa-wand-magic-sparkles" style="font-size: 30px; color: var(--primary-pink);"></i>
            <h3>הרמת ריסים + גבות</h3>
            <p>מראה טבעי, מורם ומודגש לאורך זמן.</p>
        </div>
    </section>

    <section class="section">
        <h2>גלריית עבודות</h2>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1583001931096-959e9a1a6223?w=500" alt="עבודה 1">
            <img src="https://images.unsplash.com/photo-1516975080664-ed2fc6a32937?w=500" alt="עבודה 2">
        </div>
    </section>

    <section id="booking" class="section">
        <h2>קבעו תור</h2>
        <form action="https://wa.me/972558854215" method="get">
            <input type="text" placeholder="שם מלא" required>
            <input type="tel" placeholder="מספר טלפון" required>
            <select>
                <option>בחרי שירות</option>
                <option>הלחמת ריסים</option>
                <option>הרמת ריסים</option>
            </select>
            <button type="submit" class="btn-main" style="border: none; width: 100%; cursor: pointer;">שלחי בקשה</button>
        </form>
    </section>

    <div class="floating-buttons">
        <a href="https://wa.me/972558854215" class="float-icon wa-btn" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="https://www.instagram.com/kim.beauty.1?igsh=MWU1c2J5Zmdka242aA==" class="float-icon ig-btn" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>
    </div>

</body>
</html>
